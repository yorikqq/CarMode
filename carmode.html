<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CarMode">
<meta name="theme-color" content="#080810">
<title>CarMode</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;800&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #10101c;
    --card: #181828;
    --border: rgba(255,255,255,0.06);
    --accent: #e8ff00;
    --accent-dim: rgba(232,255,0,0.12);
    --text: #f4f4ff;
    --muted: #5a5a88;
    --glow: rgba(232,255,0,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%; height:100dvh;
    background: var(--bg);
    font-family: 'Barlow', sans-serif;
    color: var(--text);
    overflow: hidden;
    touch-action: manipulation;
  }

  /* Portrait hint */
  #portrait-hint {
    display:none;
    position:fixed; inset:0;
    background: var(--bg);
    flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px; z-index:999;
    text-align:center; padding:40px;
  }
  .rotate-icon { font-size:4rem; animation: rotateHint 2s ease-in-out infinite; }
  @keyframes rotateHint { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
  #portrait-hint p { color:var(--muted); font-size:1rem; }
  #portrait-hint strong { color:var(--text); font-size:1.2rem; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.1em; }
  @media (orientation:portrait) and (max-width:500px) {
    #portrait-hint { display:flex; }
  }

  /* App layout */
  #app {
    width:100%; height:100vh; height:100dvh;
    display:grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: auto 1fr;
    gap:12px;
    padding:12px 16px;
  }

  /* Top bar */
  .topbar {
    grid-column: 1 / -1;
    display:flex; align-items:center; justify-content:space-between;
  }

  .logo {
    font-family:'Barlow Condensed', sans-serif;
    font-weight:800; font-size:1rem;
    letter-spacing:0.25em; text-transform:uppercase;
    color: var(--accent);
  }

  .topbar-right { display:flex; align-items:center; gap:14px; }

  .clock {
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.5rem; font-weight:600; letter-spacing:0.05em;
  }

  .lastfm-badge {
    display:flex; align-items:center; gap:6px;
    background: rgba(188,0,0,0.15);
    border:1px solid rgba(188,0,0,0.3);
    border-radius:20px; padding:4px 10px;
    font-size:0.65rem; font-weight:600;
    color:#ff5555; letter-spacing:0.1em; text-transform:uppercase;
  }
  .live-dot {
    width:6px; height:6px; border-radius:50%; background:#ff5555;
    animation: livepulse 1.5s infinite;
  }
  @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Album */
  .album-col {
    grid-column:1; grid-row:2;
    display:flex; align-items:center;
  }

  .album-wrap {
    position:relative;
    width: clamp(100px, 20vw, 185px);
    aspect-ratio:1;
    border-radius:16px; overflow:hidden;
    box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.7);
    background: linear-gradient(135deg, #12122a, #1a1a3a);
    transition: box-shadow 0.5s ease;
  }
  .album-wrap.playing {
    box-shadow: 0 0 0 1px rgba(232,255,0,0.35), 0 0 40px var(--glow), 0 8px 32px rgba(0,0,0,0.7);
  }

  #albumImg {
    width:100%; height:100%; object-fit:cover;
    position:absolute; inset:0; display:none;
    transition: opacity 0.4s;
  }
  .album-placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:3rem; opacity:0.2;
  }

  /* Track info */
  .track-col {
    grid-column:2; grid-row:2;
    display:flex; flex-direction:column;
    justify-content:center;
    gap:8px; padding-left:6px; min-width:0;
  }

  .now-label {
    font-size:0.65rem; font-weight:600;
    color:var(--muted); letter-spacing:0.2em; text-transform:uppercase;
  }

  .track-title {
    font-family:'Barlow Condensed', sans-serif;
    font-size: clamp(1.4rem, 4.5vw, 2.4rem);
    font-weight:800; line-height:1.05;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .track-artist {
    font-size: clamp(0.9rem, 2.5vw, 1.15rem);
    font-weight:300; color:var(--muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .track-album {
    font-size:0.75rem; color:rgba(90,90,136,0.55);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .scrobbles {
    display:inline-flex; align-items:center; gap:5px;
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:3px 10px;
    font-size:0.65rem; color:var(--muted); width:fit-content;
  }

  /* Controls — solo 3 botones grandes */
  .controls-row {
    grid-column: 1 / -1;
    display:grid;
    grid-template-columns: 1fr 1.5fr 1fr;
    gap:12px;
    padding: 0 6%;
  }

  .btn {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    aspect-ratio:1; cursor:pointer;
    transition: all 0.12s ease;
    -webkit-user-select:none; user-select:none;
    color:var(--text);
  }
  .btn:active { transform:scale(0.91); background:var(--surface); }
  .btn svg { width:44%; height:44%; }
  .btn-label {
    font-size:0.6rem; margin-top:6px;
    color:var(--muted); letter-spacing:0.08em;
    font-weight:600; text-transform:uppercase;
  }

  /* Play button highlighted */
  .btn.play-btn {
    background: var(--accent-dim);
    border-color: rgba(232,255,0,0.3);
    box-shadow: 0 0 20px rgba(232,255,0,0.08);
  }
  .btn.play-btn svg { color:var(--accent); width:50%; height:50%; }
  .btn.play-btn .btn-label { color:var(--accent); opacity:0.85; }
  .btn.play-btn:active { background:var(--accent); box-shadow:none; }
  .btn.play-btn:active svg { color:#000; }
  .btn.play-btn:active .btn-label { color:#000; }

  /* Toast */
  #toast {
    position:fixed; bottom:60px; left:50%;
    transform:translateX(-50%);
    background:rgba(20,20,40,0.95);
    border:1px solid var(--border);
    border-radius:12px; padding:8px 18px;
    font-size:0.8rem; color:var(--muted);
    white-space:nowrap; opacity:0;
    transition:opacity 0.3s; z-index:100;
    pointer-events:none;
  }
  #toast.show { opacity:1; }
</style>
</head>
<body>

<div id="portrait-hint">
  <div class="rotate-icon">📱</div>
  <strong>Gira el móvil</strong>
  <p>CarMode funciona en horizontal</p>
</div>

<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">🚗 CarMode</div>
    <div class="topbar-right">
      <div class="lastfm-badge">
        <div class="live-dot"></div>
        Last.fm · yorikqq
      </div>
      <div class="clock" id="clockEl">--:--</div>
    </div>
  </div>

  <!-- Album art -->
  <div class="album-col">
    <div class="album-wrap" id="albumWrap">
      <div class="album-placeholder" id="albumPlaceholder">🎵</div>
      <img id="albumImg" src="" alt="">
    </div>
  </div>

  <!-- Track info -->
  <div class="track-col">
    <div class="now-label" id="nowLabel">Esperando música...</div>
    <div class="track-title" id="trackTitle">—</div>
    <div class="track-artist" id="trackArtist">Abre Spotify y dale al play</div>
    <div class="track-album" id="trackAlbum"></div>
    <div class="scrobbles" id="scrobblesBadge" style="display:none">
      ♫ <span id="scrobblesCount">0</span> scrobbles totales
    </div>
  </div>

  <!-- 3 controles -->
  <div class="controls-row">

    <!-- Anterior -->
    <div class="btn" onclick="toast('Usa los controles de Spotify 🎵')">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
      </svg>
      <span class="btn-label">Anterior</span>
    </div>

    <!-- Play / Pausa -->
    <div class="btn play-btn" onclick="toast('Usa los controles de Spotify 🎵')">
      <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <span class="btn-label" id="playLabel">Play</span>
    </div>

    <!-- Siguiente -->
    <div class="btn" onclick="toast('Usa los controles de Spotify 🎵')">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 18l8.5-6L6 6v12zm2.5-6 6-4.25v8.5L8.5 12zM16 6h2v12h-2z"/>
      </svg>
      <span class="btn-label">Siguiente</span>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const API_KEY  = '4dfa3064c023422534817b274234f351';
  const USER     = 'yorikqq';
  const BASE_URL = 'https://ws.audioscrobbler.com/2.0/';

  let lastKey = '';

  // Clock
  function tick() {
    const n = new Date();
    document.getElementById('clockEl').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  tick(); setInterval(tick, 15000);

  // Toast
  function toast(msg, ms = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
  }

  // Fetch now playing
  async function fetchNowPlaying() {
    try {
      const url = `${BASE_URL}?method=user.getrecenttracks&user=${USER}&api_key=${API_KEY}&format=json&limit=1`;
      const r = await fetch(url);
      const d = await r.json();
      if (d.error) return;

      const list = d.recenttracks?.track;
      if (!list) return;

      const track = Array.isArray(list) ? list[0] : list;
      const nowPlaying = track['@attr']?.nowplaying === 'true';
      const title  = track.name || '—';
      const artist = track.artist?.['#text'] || track.artist || '—';
      const album  = track.album?.['#text'] || '';
      const key    = title + '|' + artist;

      if (key !== lastKey) {
        lastKey = key;
        renderTrack(title, artist, album, track.image, nowPlaying);
      } else {
        // Update playing state even if same track
        updatePlayingState(nowPlaying);
      }

      fetchStats();
    } catch(e) {}
  }

  async function fetchStats() {
    try {
      const url = `${BASE_URL}?method=user.getinfo&user=${USER}&api_key=${API_KEY}&format=json`;
      const r = await fetch(url);
      const d = await r.json();
      if (d.user?.playcount) {
        document.getElementById('scrobblesCount').textContent =
          Number(d.user.playcount).toLocaleString('es-ES');
        document.getElementById('scrobblesBadge').style.display = 'inline-flex';
      }
    } catch(e) {}
  }

  function updatePlayingState(nowPlaying) {
    const lbl  = document.getElementById('nowLabel');
    const wrap = document.getElementById('albumWrap');
    if (nowPlaying) {
      lbl.textContent = '▶ Sonando ahora';
      lbl.style.color = 'var(--accent)';
      wrap.classList.add('playing');
    } else {
      lbl.textContent = 'Última escuchada';
      lbl.style.color = 'var(--muted)';
      wrap.classList.remove('playing');
    }
  }

  function renderTrack(title, artist, album, images, nowPlaying) {
    document.getElementById('trackTitle').textContent  = title;
    document.getElementById('trackArtist').textContent = artist;
    document.getElementById('trackAlbum').textContent  = album;
    updatePlayingState(nowPlaying);

    const img = document.getElementById('albumImg');
    const ph  = document.getElementById('albumPlaceholder');
    const large = images?.find(i => i.size === 'extralarge') || images?.[images.length-1];
    const src = large?.['#text'] || '';

    // Last.fm default "no image" hash
    if (src && !src.includes('2a96cbd8b46e442fc41c2b86b821562f')) {
      img.style.opacity = '0';
      img.style.display = 'block';
      ph.style.display  = 'none';
      img.onload  = () => { img.style.opacity = '1'; };
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
      img.src = src;
    } else {
      img.style.display = 'none';
      ph.style.display  = 'flex';
    }
  }

  // Poll every 15s
  fetchNowPlaying();
  setInterval(fetchNowPlaying, 15000);

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/CarMode/sw.js').catch(() => {});
  }
</script>
</body>
</html>
