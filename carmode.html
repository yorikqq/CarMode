<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CarMode">
<meta name="theme-color" content="#080810">
<title>CarMode</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;800;900&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --card: #181828;
    --border: rgba(255,255,255,0.06);
    --accent: #e8ff00;
    --accent-dim: rgba(232,255,0,0.12);
    --text: #f4f4ff;
    --muted: #5a5a88;
    --glow: rgba(232,255,0,0.22);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100dvh;
    background:var(--bg);
    font-family:'Barlow', sans-serif;
    color:var(--text);
    overflow:hidden;
    touch-action:manipulation;
  }

  #portrait-hint {
    display:none; position:fixed; inset:0; background:var(--bg);
    flex-direction:column; align-items:center; justify-content:center;
    gap:20px; z-index:999; text-align:center; padding:40px;
  }
  .rotate-icon { font-size:4rem; animation:rotateHint 2s ease-in-out infinite; }
  @keyframes rotateHint { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
  #portrait-hint p { color:var(--muted); font-size:1rem; }
  #portrait-hint strong { color:var(--text); font-size:1.2rem; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.1em; }
  @media (orientation:portrait) and (max-width:500px) { #portrait-hint { display:flex; } }

  /* Layout: topbar + main row + bottom button */
  #app {
    width:100%; height:100dvh;
    display:grid;
    grid-template-rows: auto 1fr auto;
    gap:0;
    padding:10px 16px 12px;
  }

  /* Top bar */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px;
  }
  .logo {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:800; font-size:1rem;
    letter-spacing:0.25em; text-transform:uppercase;
    color:var(--accent);
  }
  .topbar-right { display:flex; align-items:center; gap:14px; }
  .clock {
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.6rem; font-weight:600; letter-spacing:0.03em;
  }
  .lastfm-badge {
    display:flex; align-items:center; gap:6px;
    background:rgba(188,0,0,0.15); border:1px solid rgba(188,0,0,0.3);
    border-radius:20px; padding:4px 10px;
    font-size:0.65rem; font-weight:600; color:#ff5555;
    letter-spacing:0.1em; text-transform:uppercase;
  }
  .live-dot {
    width:6px; height:6px; border-radius:50%; background:#ff5555;
    animation:livepulse 1.5s infinite;
  }
  @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Main row: album + info */
  .main-row {
    display:grid;
    grid-template-columns: auto 1fr;
    gap:20px;
    align-items:center;
    min-height:0;
  }

  /* Album — mucho más grande */
  .album-wrap {
    position:relative;
    height:calc(100dvh - 120px);
    aspect-ratio:1;
    border-radius:20px; overflow:hidden;
    box-shadow: 0 0 0 1px var(--border), 0 10px 40px rgba(0,0,0,0.8);
    background:linear-gradient(135deg, #12122a, #1a1a3a);
    transition:box-shadow 0.5s ease;
    flex-shrink:0;
  }
  .album-wrap.playing {
    box-shadow: 0 0 0 1.5px rgba(232,255,0,0.4), 0 0 50px var(--glow), 0 10px 40px rgba(0,0,0,0.8);
  }
  #albumImg {
    width:100%; height:100%; object-fit:cover;
    position:absolute; inset:0; display:none;
    transition:opacity 0.4s;
  }
  .album-placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:5rem; opacity:0.15;
  }

  /* Track info — texto más grande */
  .track-col {
    display:flex; flex-direction:column;
    justify-content:center;
    gap:10px; min-width:0;
  }
  .now-label {
    font-size:0.75rem; font-weight:600; color:var(--muted);
    letter-spacing:0.2em; text-transform:uppercase;
  }
  .track-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(1.8rem, 5.5vw, 3.2rem);
    font-weight:900; line-height:1.0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .track-artist {
    font-size:clamp(1.1rem, 3vw, 1.6rem);
    font-weight:300; color:var(--muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .track-album {
    font-size:clamp(0.8rem, 1.8vw, 1rem);
    color:rgba(90,90,136,0.6);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .scrobbles {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:4px 12px;
    font-size:0.7rem; color:var(--muted); width:fit-content;
    margin-top:4px;
  }

  /* Bottom button */
  .bottom-row {
    display:flex; justify-content:center;
    padding-top:10px;
  }
  .spotify-btn {
    display:flex; align-items:center; justify-content:center; gap:14px;
    background:#1a2a1a; border:1px solid rgba(30,215,96,0.25);
    border-radius:18px;
    padding:0 36px;
    height:52px;
    width:clamp(200px, 40%, 300px);
    cursor:pointer; text-decoration:none; color:var(--text);
    transition:all 0.12s ease;
    -webkit-user-select:none; user-select:none;
  }
  .spotify-btn:active { transform:scale(0.95); background:#1DB954; }
  .spotify-btn:active .spotify-label { color:#000; }
  .spotify-btn:active svg { color:#000; }
  .spotify-btn svg { width:26px; height:26px; color:#1DB954; flex-shrink:0; }
  .spotify-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:1rem; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; color:#1DB954;
  }
</style>
</head>
<body>

<div id="portrait-hint">
  <div class="rotate-icon">📱</div>
  <strong>Gira el móvil</strong>
  <p>CarMode funciona en horizontal</p>
</div>

<div id="app">

  <div class="topbar">
    <div class="logo">🚗 CarMode</div>
    <div class="topbar-right">
      <div class="lastfm-badge"><div class="live-dot"></div>Last.fm · yorikqq</div>
      <div class="clock" id="clockEl">--:--</div>
    </div>
  </div>

  <div class="main-row">
    <div class="album-wrap" id="albumWrap">
      <div class="album-placeholder" id="albumPlaceholder">🎵</div>
      <img id="albumImg" src="" alt="">
    </div>

    <div class="track-col">
      <div class="now-label" id="nowLabel">Esperando música...</div>
      <div class="track-title" id="trackTitle">—</div>
      <div class="track-artist" id="trackArtist">Abre Spotify y dale al play</div>
      <div class="track-album" id="trackAlbum"></div>
      <div class="scrobbles" id="scrobblesBadge" style="display:none">
        ♫ <span id="scrobblesCount">0</span> scrobbles totales
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <a class="spotify-btn" href="spotify://">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
      </svg>
      <span class="spotify-label">Abrir Spotify</span>
    </a>
  </div>

</div>

<script>
  const API_KEY  = '4dfa3064c023422534817b274234f351';
  const USER     = 'yorikqq';
  const BASE_URL = 'https://ws.audioscrobbler.com/2.0/';
  let lastKey = '';

  function tick() {
    const n = new Date();
    document.getElementById('clockEl').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  tick(); setInterval(tick, 15000);

  async function fetchNowPlaying() {
    try {
      const r = await fetch(`${BASE_URL}?method=user.getrecenttracks&user=${USER}&api_key=${API_KEY}&format=json&limit=1`);
      const d = await r.json();
      if (d.error) return;
      const list = d.recenttracks?.track;
      if (!list) return;
      const track      = Array.isArray(list) ? list[0] : list;
      const nowPlaying = track['@attr']?.nowplaying === 'true';
      const title      = track.name || '—';
      const artist     = track.artist?.['#text'] || track.artist || '—';
      const album      = track.album?.['#text'] || '';
      const key        = title + '|' + artist;
      if (key !== lastKey) { lastKey = key; renderTrack(title, artist, album, track.image, nowPlaying); fetchStats(); }
      else updateState(nowPlaying);
    } catch(e) {}
  }

  async function fetchStats() {
    try {
      const r = await fetch(`${BASE_URL}?method=user.getinfo&user=${USER}&api_key=${API_KEY}&format=json`);
      const d = await r.json();
      if (d.user?.playcount) {
        document.getElementById('scrobblesCount').textContent = Number(d.user.playcount).toLocaleString('es-ES');
        document.getElementById('scrobblesBadge').style.display = 'inline-flex';
      }
    } catch(e) {}
  }

  function updateState(nowPlaying) {
    const lbl  = document.getElementById('nowLabel');
    const wrap = document.getElementById('albumWrap');
    if (nowPlaying) {
      lbl.textContent = '▶ Sonando ahora'; lbl.style.color = 'var(--accent)';
      wrap.classList.add('playing');
    } else {
      lbl.textContent = 'Última escuchada'; lbl.style.color = 'var(--muted)';
      wrap.classList.remove('playing');
    }
  }

  function renderTrack(title, artist, album, images, nowPlaying) {
    document.getElementById('trackTitle').textContent  = title;
    document.getElementById('trackArtist').textContent = artist;
    document.getElementById('trackAlbum').textContent  = album;
    updateState(nowPlaying);
    const img   = document.getElementById('albumImg');
    const ph    = document.getElementById('albumPlaceholder');
    const large = images?.find(i => i.size === 'extralarge') || images?.[images.length-1];
    const src   = large?.['#text'] || '';
    if (src && !src.includes('2a96cbd8b46e442fc41c2b86b821562f')) {
      img.style.opacity = '0'; img.style.display = 'block'; ph.style.display = 'none';
      img.onload  = () => { img.style.opacity = '1'; };
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
      img.src = src;
    } else {
      img.style.display = 'none'; ph.style.display = 'flex';
    }
  }

  fetchNowPlaying();
  setInterval(fetchNowPlaying, 15000);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/CarMode/sw.js').catch(() => {});
  }
</script>
</body>
</html>
